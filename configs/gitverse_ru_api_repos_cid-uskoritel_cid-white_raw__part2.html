    <script>
        lucide.createIcons();
        function copyCurrentUrl() {
            const el = document.createElement('textarea');

            document.execCommand('copy');
            document.body.removeChild(el);

            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {

            }, 3000);
        }
