    <script>
        lucide.createIcons();
        function copyCurrentUrl() {
            const el = document.createElement('textarea');

            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
